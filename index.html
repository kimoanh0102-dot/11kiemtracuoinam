                { q: "Với $a, b > 0$, biểu thức $\\log_5\\frac{a^3}{25b}$ rút gọn thành:", options: ["$3\\log_5 a - \\log_5 b + 2$", "$3\\log_5 a - \\log_5 b - 25$", "$\\frac{1}{3}\\log_5 a - \\log_5 b - 2$", "$3\\log_5 a - \\log_5 b - 2$"], correct: 3, cat: "Logarit" },
                { q: "Tập xác định của hàm số $y = \\log_2(x^2+x+1)$ là:", options: ["$D = \\mathbb{R} $", "$D = (0; +\\infty)$", "$D = \\mathbb{R} \\setminus \\{0\\}$", "$D = (1; +\\infty)$"], correct: 0, cat: "Hàm số" },
                { q: "Mệnh đề nào đúng? $P(A \\cap B) = 0$ khi và chỉ khi $A, B$ là hai biến cố:", options: ["Độc lập", "Xung khắc", "Đối nhau", "Hợp nhau"], correct: 1, cat: "Xác suất" },
                { q: "Cho $A, B$ độc lập, biết $P(A)=0,8; P(B)=0,2$. Khi đó $P(A \\cup B)$ là:", options: ["$1,0$", "$0,16$", "$0,84$", "$0,64$"], correct: 2, cat: "Xác suất" },
                { q: "Xác suất đỗ của hai học sinh dự thi là $0,9$ và $0,9$. Xác suất có đúng một bạn đỗ là:", options: ["$0,81$", "$0,01$", "$0,09$", "$0,18$"], correct: 3, cat: "Xác suất" },
                { q: "Tiếp tuyến của đồ thị hàm số $y = \\frac{1}{x}$ tại điểm $x=1$ là:", options: ["$y = -x + 2$", "$y = -x + 1$", "$y = x$", "$y = -x - 2$"], correct: 0, cat: "Đạo hàm" },
                { q: "Cho hàm số $f(x) = \\log_2 x$. Giá trị đạo hàm cấp hai $f''(1)$ là:", options: ["$1/\\ln 2$", "$-1/\\ln 2$", "$-1$", "$0$"], correct: 1, cat: "Đạo hàm" },
                { q: "Gia tốc của một chất điểm có quãng đường $s(t) = \\frac{1}{2}t^2 + 5t$ tại thời điểm $t=10s$ là:", options: ["$10 m/s^2$", "$5 m/s^2$", "$1 m/s^2$", "$15 m/s^2$"], correct: 2, cat: "Đạo hàm" }
            ]
        };

        const { useState, useEffect, useRef } = React;

        // Custom SVGs to replace Lucide
        const Icons = {
            User: () => React.createElement('svg', { width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('path', { d: 'M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2' }),
                React.createElement('circle', { cx: '12', cy: '7', r: '4' })
            ),
            Check: () => React.createElement('svg', { width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('path', { d: 'M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z' }),
                React.createElement('path', { d: 'm9 12 2 2 4-4' })
            ),
            Clock: () => React.createElement('svg', { width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('circle', { cx: '12', cy: '12', r: '10' }),
                React.createElement('polyline', { points: '12 6 12 12 16 14' })
            ),
            Shield: () => React.createElement('svg', { width: '24', height: '24', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
                React.createElement('path', { d: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z' })
            )
        };

        const Latex = ({ text }) => {
            const spanRef = useRef();
            useEffect(() => {
                if (spanRef.current) {
                    const regex = /\$(.*?)\$/g;
                    const rendered = text.replace(regex, (match, formula) => {
                        try { return katex.renderToString(formula, { throwOnError: false }); } 
                        catch { return match; }
                    });
                    spanRef.current.innerHTML = rendered;
                }
            }, [text]);
            return React.createElement('span', { ref: spanRef });
        };

        const App = () => {
            const TOTAL_TIME = 900; 
            const [state, setState] = useState('LOGIN'); 
            const [studentName, setStudentName] = useState('');
            const [examCode, setExamCode] = useState(null);
            const [currIdx, setCurrIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [timeLeft, setTimeLeft] = useState(TOTAL_TIME); 
            const [logs, setLogs] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [user, setUser] = useState(null);
            const [violationAlert, setViolationAlert] = useState(false);

            const dbRef = useRef();
            // Lấy appId từ môi trường hoặc mặc định
            const appId = (typeof window.__app_id !== 'undefined') ? window.__app_id : 'math-quiz-final-production';

            useEffect(() => {
                // Chỉ khởi tạo Firebase nếu có config
                const configStr = (typeof window.__firebase_config !== 'undefined') ? window.__firebase_config : null;
                const config = FIREBASE_CONFIG || (configStr ? JSON.parse(configStr) : null);
                
                if (config && !firebase.apps.length) {
                    const app = firebase.initializeApp(config);
                    dbRef.current = app.firestore();
                }
                
                const initAuth = async () => {
                    const auth = firebase.auth();
                    try {
                        const token = (typeof window.__initial_auth_token !== 'undefined') ? window.__initial_auth_token : null;
                        if (token) {
                            const cred = await auth.signInWithCustomToken(token);
                            setUser(cred.user);
                        } else {
                            const cred = await auth.signInAnonymously();
                            setUser(cred.user);
                        }
                    } catch(e) { 
                        console.error("Auth error:", e);
                        // Fallback để vẫn cho làm bài nếu ko có DB
                        setUser({ uid: 'guest-' + Math.random().toString(36).substr(2, 9) });
                    }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (state !== 'TESTING') return;

                const handleVisibility = () => {
                    if (document.hidden) {
                        setLogs(p => [...p, `Rời tab lúc ${new Date().toLocaleTimeString()}`]);
                        setViolationAlert(true);
                        setTimeout(() => setViolationAlert(false), 3000);
                    }
                };
                const handleBlur = () => setLogs(p => [...p, `Chuyển cửa sổ lúc ${new Date().toLocaleTimeString()}`]);

                window.addEventListener('visibilitychange', handleVisibility);
                window.addEventListener('blur', handleBlur);

                const timer = setInterval(() => {
                    setTimeLeft(p => {
                        if (p <= 1) {
                            clearInterval(timer);
                            submitQuiz();
                            return 0;
                        }
                        return p - 1;
                    });
                }, 1000);

                return () => {
                    window.removeEventListener('visibilitychange', handleVisibility);
                    window.removeEventListener('blur', handleBlur);
                    clearInterval(timer);
                };
            }, [state]);

            const startQuiz = async () => {
                if (!studentName.trim() || isLoading || !user) return;
                setIsLoading(true);

                try {
                    let takenCodes = [];
                    // Kiểm tra lịch sử từ Firebase nếu có DB
                    if (dbRef.current) {
                        const resultsSnapshot = await dbRef.current
                            .collection('artifacts').doc(appId)
                            .collection('public').doc('data')
                            .collection('results')
                            .get();

                        takenCodes = resultsSnapshot.docs
                            .map(doc => doc.data())
                            .filter(data => data.name && data.name.toLowerCase().trim() === studentName.toLowerCase().trim())
                            .map(data => data.code);
                    }

                    const availableCodes = Object.keys(QUIZ_BANK).filter(code => !takenCodes.includes(code));
                    
                    let selected = availableCodes.length > 0 
                        ? availableCodes[Math.floor(Math.random() * availableCodes.length)]
                        : Object.keys(QUIZ_BANK)[Math.floor(Math.random() * 7)];

                    setExamCode(selected);
                    setState('TESTING');
                    setCurrIdx(0);
                    setAnswers({});
                    setTimeLeft(TOTAL_TIME);
                    setLogs([]);
                } catch (e) {
                    setExamCode(Object.keys(QUIZ_BANK)[Math.floor(Math.random() * 7)]);
                    setState('TESTING');
                } finally {
                    setIsLoading(false);
                }
            };

            const submitQuiz = async () => {
                if (state === 'FINISHED' || isSubmitting) return;
                setIsSubmitting(true);

                const questions = QUIZ_BANK[examCode];
                let score = 0;
                questions.forEach((q, i) => { if (answers[i] === q.correct) score++; });

                const data = {
                    name: studentName,
                    code: examCode,
                    score,
                    total: 10,
                    logs,
                    timeUsed: TOTAL_TIME - timeLeft,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    userId: user.uid
                };

                try {
                    if (dbRef.current) {
                        await dbRef.current.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add(data);
                    }

                    if (GOOGLE_SHEET_URL) {
                        await fetch(GOOGLE_SHEET_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(data)
                        });
                    }
                } catch (e) { console.error("Submit error:", e); }
                
                setState('FINISHED');
                setIsSubmitting(false);
            };

            const formatTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
            const timePercentage = (timeLeft / TOTAL_TIME) * 100;

            if (state === 'LOGIN') {
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4 animate-in fade-in duration-500' },
                    React.createElement('div', { className: 'bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-200' },
                        React.createElement('div', { className: 'text-center mb-8' },
                            React.createElement('div', { className: 'bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg text-white' },
                                React.createElement(Icons.User)
                            ),
                            React.createElement('h2', { className: 'text-3xl font-black text-slate-800' }, 'Kiểm Tra Toán 11'),
                            React.createElement('p', { className: 'text-slate-400 font-medium' }, 'Thời gian làm bài: 15 phút')
                        ),
                        React.createElement('div', { className: 'space-y-6' },
                            React.createElement('div', null,
                                React.createElement('label', { className: 'block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-2' }, 'Họ và tên học sinh'),
                                React.createElement('input', {
                                    type: 'text',
                                    value: studentName,
                                    onChange: e => setStudentName(e.target.value),
                                    placeholder: 'VD: Nguyễn Văn A',
                                    className: 'w-full p-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all font-semibold'
                                })
                            ),
                            React.createElement('button', {
                                onClick: startQuiz,
                                disabled: !studentName.trim() || isLoading || !user,
                                className: 'w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all disabled:opacity-50 flex items-center justify-center gap-2'
                            }, isLoading ? 'Đang chuẩn bị đề...' : 'Bắt Đầu Làm Bài')
                        ),
                        React.createElement('div', { className: 'mt-6 p-4 bg-amber-50 rounded-2xl border border-amber-100 flex gap-3 items-center' },
                            React.createElement('div', { className: 'text-amber-600' }, React.createElement(Icons.Shield)),
                            React.createElement('p', { className: 'text-[11px] text-amber-700 font-medium' }, 'Hệ thống tự động chọn mã đề ngẫu nhiên không trùng lặp và giám sát hành vi.')
                        )
                    )
                );
            }

            if (state === 'TESTING') {
                const q = QUIZ_BANK[examCode][currIdx];
                return React.createElement('div', { className: 'min-h-screen p-4 md:p-8 flex flex-col items-center' },
                    React.createElement('div', { className: 'w-full max-w-4xl space-y-4' },
                        
                        React.createElement('div', { className: 'w-full bg-slate-200 h-3 rounded-full overflow-hidden shadow-inner' },
                            React.createElement('div', { 
                                className: `h-full timer-bar-transition ${timeLeft < 60 ? 'animate-pulse-red' : timeLeft < 300 ? 'bg-amber-500' : 'bg-indigo-600'}`,
                                style: { width: `${timePercentage}%` }
                            })
                        ),

                        React.createElement('div', { className: 'flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-slate-200' },
                            React.createElement('div', null,
                                React.createElement('h3', { className: 'font-black text-slate-800' }, `Mã Đề: ${examCode}`),
                                React.createElement('p', { className: 'text-xs font-bold text-slate-400' }, studentName)
                            ),
                            React.createElement('div', { className: 'flex items-center gap-3 bg-indigo-50 px-5 py-2 rounded-2xl border border-indigo-100 font-mono text-xl font-black text-indigo-600' },
                                formatTime(timeLeft)
                            )
                        ),

                        React.createElement('div', { className: 'flex gap-2 overflow-x-auto pb-2 scrollbar-hide' },
                            QUIZ_BANK[examCode].map((_, i) => React.createElement('button', {
                                key: i,
                                onClick: () => setCurrIdx(i),
                                className: `min-w-[42px] h-11 rounded-xl font-bold transition-all shadow-sm ${currIdx === i ? 'bg-indigo-600 text-white scale-110 shadow-indigo-100' : answers[i] !== undefined ? 'bg-indigo-100 text-indigo-600' : 'bg-white text-slate-400'}`
                            }, i + 1))
                        ),

                        React.createElement('div', { className: 'bg-white p-8 md:p-10 rounded-[2.5rem] shadow-xl border border-slate-100 relative min-h-[300px]' },
                            React.createElement('div', { className: 'absolute top-6 right-8 text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]' }, q.cat),
                            React.createElement('div', { className: 'text-xl md:text-2xl font-bold text-slate-800 leading-relaxed mb-10 pt-4' },
                                React.createElement('span', { className: 'text-indigo-600 mr-2' }, `Câu ${currIdx + 1}:`),
                                React.createElement(Latex, { text: q.q })
                            ),
                            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                                q.options.map((opt, i) => React.createElement('button', {
                                    key: i,
                                    onClick: () => setAnswers(p => ({ ...p, [currIdx]: i })),
                                    className: `p-6 rounded-3xl border-2 transition-all text-left flex items-center gap-4 group ${answers[currIdx] === i ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl translate-y-[-2px]' : 'bg-white border-slate-100 hover:border-indigo-200 hover:bg-indigo-50/20'}`
                                },
                                    React.createElement('div', { className: `w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm shrink-0 transition-all ${answers[currIdx] === i ? 'bg-white/20 text-white' : 'bg-slate-50 text-slate-400 group-hover:bg-indigo-100 group-hover:text-indigo-600'}` }, String.fromCharCode(65 + i)),
                                    React.createElement(Latex, { text: opt })
                                ))
                            )
                        ),

                        React.createElement('div', { className: 'flex justify-between items-center pb-10' },
                            React.createElement('button', {
                                onClick: () => setCurrIdx(p => Math.max(0, p - 1)),
                                disabled: currIdx === 0,
                                className: 'px-6 py-3 rounded-2xl font-bold text-slate-400 hover:text-slate-600 disabled:opacity-20 transition-all'
                            }, 'Câu Trước'),
                            currIdx < 9 ? 
                                React.createElement('button', {
                                    onClick: () => setCurrIdx(p => p + 1),
                                    className: 'px-8 py-3 bg-white border border-slate-200 rounded-2xl font-bold text-slate-600 hover:bg-slate-50 shadow-sm transition-all'
                                }, 'Câu Tiếp') :
                                React.createElement('button', {
                                    onClick: submitQuiz,
                                    disabled: isSubmitting,
                                    className: 'px-10 py-3 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all disabled:opacity-50'
                                }, isSubmitting ? 'Đang nộp...' : 'Nộp Bài Thi')
                        )
                    ),
                    
                    violationAlert && React.createElement('div', { className: 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-rose-600 text-white px-6 py-3 rounded-2xl shadow-2xl font-bold flex items-center gap-3 animate-bounce z-50' },
                        React.createElement('div', { className: 'w-6 h-6' }, React.createElement(Icons.Shield)),
                        'CẢNH BÁO: Phát hiện hành vi rời màn hình!'
                    )
                );
            }

            if (state === 'FINISHED') {
                const questions = QUIZ_BANK[examCode];
                const score = questions.filter((q, i) => answers[i] === q.correct).length;
                return React.createElement('div', { className: 'min-h-screen flex items-center justify-center p-4 animate-in fade-in duration-500' },
                    React.createElement('div', { className: 'bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-xl text-center border border-slate-200' },
                        React.createElement('div', { className: 'bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600' },
                            React.createElement(Icons.Check)
                        ),
                        React.createElement('h2', { className: 'text-4xl font-black text-slate-800 mb-2' }, 'Hoàn Thành!'),
                        React.createElement('p', { className: 'text-slate-400 font-bold mb-8' }, `Học sinh: ${studentName} - Mã đề: ${examCode}`),
                        React.createElement('div', { className: 'grid grid-cols-3 gap-4 mb-10' },
                            React.createElement('div', { className: 'bg-slate-50 p-6 rounded-3xl shadow-sm border border-slate-100' },
                                React.createElement('div', { className: 'text-3xl font-black text-indigo-600' }, `${score}/10`),
                                React.createElement('div', { className: 'text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-1' }, 'Điểm số')
                            ),
                            React.createElement('div', { className: 'bg-slate-50 p-6 rounded-3xl shadow-sm border border-slate-100' },
                                React.createElement('div', { className: 'text-3xl font-black text-emerald-500' }, `${score * 10}%`),
                                React.createElement('div', { className: 'text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-1' }, 'Tỷ lệ')
                            ),
                            React.createElement('div', { className: 'bg-slate-50 p-6 rounded-3xl shadow-sm border border-slate-100' },
                                React.createElement('div', { className: `text-3xl font-black ${logs.length > 0 ? 'text-rose-500' : 'text-slate-400'}` }, logs.length),
                                React.createElement('div', { className: 'text-[10px] font-bold text-slate-300 uppercase tracking-widest mt-1' }, 'Vi phạm')
                            )
                        ),
                        
                        logs.length > 0 && React.createElement('div', { className: 'mb-8 p-4 bg-rose-50 rounded-2xl border border-rose-100 text-left' },
                            React.createElement('p', { className: 'text-xs font-bold text-rose-600 uppercase mb-2 ml-1' }, 'Nhật ký giám sát:'),
                            React.createElement('div', { className: 'text-[10px] text-rose-500 max-h-24 overflow-y-auto space-y-1 pr-2 scrollbar-hide font-medium' },
                                logs.map((l, i) => React.createElement('p', { key: i }, `• ${l}`))
                            )
                        ),

                        React.createElement('button', {
                            onClick: () => { setState('LOGIN'); setStudentName(''); setAnswers({}); },
                            className: 'px-8 py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 transition-all shadow-xl'
                        }, 'Quay Lại Đăng Nhập')
                    )
                );
            }
        };

        window.onload = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(App));
        };
    </script>
</body>
</html>
